<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex</title>

  <link rel="stylesheet" href="../css/style.css">

  <script src="../js/pokemon.js" defer></script>
</head>

<body>

<div class="container">

  <header class="header">

    <div class="logo">
      <img src="../assets/pokeball.svg" alt="logo">
      <h1>Pokedex</h1>
    </div>

    <div class="controls">

      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search Pokemon...">
        <button id="search-clear" class="hidden">×</button>
      </div>

      <div class="sort-box">
        <button id="sort-btn">☰</button>
        <div class="sort-options hidden">
          <label>
            <input type="radio" name="sort" value="number" checked> Number
          </label>
          <label>
            <input type="radio" name="sort" value="name"> Name
          </label>
        </div>
      </div>

    </div>

    <div class="toggles">
      <button id="dark-mode">Dark</button>
      <button id="favorites">Favorites</button>
    </div>

  </header>

  <div id="loading" class="loading hidden">Loading...</div>

  <main class="pokemon-grid" id="pokemon-grid"></main>

  <p id="not-found" class="not-found hidden">No Pokemon found</p>

</div>

</body>
</html>
