<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Detail</title>
  <link rel="stylesheet" href="style.css" />
  <script src="pokemon-detail.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <button id="back-btn">← Back</button>
      <div class="info">
        <h1 id="pokemon-name">Bulbasaur</h1>
        <span id="pokemon-id">#001</span>
      </div>
    </header>

    <div class="nav-arrows">
      <button id="prev-btn" class="arrow">‹</button>
      <button id="next-btn" class="arrow">›</button>
    </div>

    <div class="detail-content">
      <div class="pokemon-image">
        <img id="pokemon-img" src="" alt="" />
      </div>

      <div class="types" id="pokemon-types"></div>

      <div class="info-grid">
        <div class="info-item">
          <span class="label">Weight</span>
          <span id="pokemon-weight">6.9 kg</span>
        </div>
        <div class="info-item">
          <span class="label">Height</span>
          <span id="pokemon-height">0.7 m</span>
        </div>
        <div class="info-item">
          <span class="label">Abilities</span>
          <div id="pokemon-abilities"></div>
        </div>
      </div>

      <div class="description">
        <h3>About</h3>
        <p class="pokemon-description"></p>
      </div>

      <div class="stats">
        <h3>Base Stats</h3>
        <div class="stats-list" id="stats-list"></div>
      </div>
    </div>
  </div>
</body>
</html>
